<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inner Page - Tracked Elements</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 200vh; /* 使页面可滚动 */
    }

    .container {
      max-width: 100%;
      padding: 10px;
    }

    h1 {
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }

    .tracked-element {
      margin-bottom: 20px;
      padding: 20px;
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 不同的元素样式 */
    #element-1 {
      background: #e74c3c;
      width: 150px;
      height: 100px;
      border-radius: 8px;
    }

    #element-2 {
      background: #3498db;
      width: 200px;
      height: 80px;
      border-radius: 20px;
      margin-left: 50px;
    }

    #element-3 {
      background: #2ecc71;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-left: 100px;
    }

    #element-4 {
      background: #9b59b6;
      width: 180px;
      height: 60px;
      border: 4px solid #8e44ad;
      transform: rotate(5deg);
    }

    #element-5 {
      background: #f39c12;
      width: 160px;
      height: 90px;
      border-radius: 0 30px 0 30px;
      margin-left: 80px;
    }

    /* 靠近边缘的元素，用于演示标注超出 iframe */
    #element-edge-top {
      background: #1abc9c;
      width: 140px;
      height: 70px;
      position: absolute;
      top: 5px;
      right: 20px;
      border-radius: 8px;
    }

    #element-edge-left {
      background: #e67e22;
      width: 100px;
      height: 100px;
      position: absolute;
      left: 5px;
      top: 300px;
      border-radius: 8px;
    }

    /* 底部区域，需要滚动才能看到 */
    .bottom-section {
      margin-top: 400px;
      padding: 20px;
      background: #ecf0f1;
      border-radius: 8px;
    }

    #element-bottom {
      background: #34495e;
      width: 200px;
      height: 100px;
      border-radius: 12px;
    }

    .info {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Inner Page - Tracked Elements</h1>

    <!-- 靠近顶部边缘 -->
    <div id="element-edge-top" class="tracked-element">Edge Top</div>

    <!-- 靠近左边缘 -->
    <div id="element-edge-left" class="tracked-element">Edge Left</div>

    <!-- 普通元素 -->
    <div id="element-1" class="tracked-element">Element 1</div>
    <div id="element-2" class="tracked-element">Element 2</div>
    <div id="element-3" class="tracked-element">Element 3</div>
    <div id="element-4" class="tracked-element">Element 4</div>
    <div id="element-5" class="tracked-element">Element 5</div>

    <!-- 底部区域 -->
    <div class="bottom-section">
      <p class="info">Scroll down to see this element</p>
      <div id="element-bottom" class="tracked-element">Bottom Element</div>
    </div>
  </div>

  <script type="module" src="./inner.ts"></script>
</body>
</html>
